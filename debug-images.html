<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Direto - Imagens do Carrossel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-img {
            max-width: 200px;
            margin: 10px;
            border: 2px solid #ddd;
            display: block;
        }
        .status {
            color: green;
            font-weight: bold;
        }
        .error {
            color: red;
            font-weight: bold;
        }
        .loading {
            color: orange;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Teste Direto das Imagens do Carrossel</h1>
    <p>Testando se as imagens f1.png a f5.png carregam corretamente:</p>

    <div id="results"></div>

    <h2>Imagens:</h2>
    <div id="images-container">
        <!-- Images will be added by JavaScript -->
    </div>

    <script>
        const resultsDiv = document.getElementById('results');
        const imagesContainer = document.getElementById('images-container');
        const results = {};

        function updateResults() {
            resultsDiv.innerHTML = '<h3>Resultados:</h3>' +
                Object.entries(results).map(([id, status]) => {
                    const className = status === 'loaded' ? 'status' :
                                    status === 'error' ? 'error' : 'loading';
                    return `<p class="${className}">${id}: ${status}</p>`;
                }).join('');
        }

        function testImage(imageName) {
            results[imageName] = 'carregando...';
            updateResults();

            const img = document.createElement('img');
            img.className = 'test-img';
            img.alt = `Teste ${imageName}`;

            img.onload = function() {
                results[imageName] = 'loaded';
                updateResults();
                console.log(`✅ ${imageName} carregou com sucesso`);
            };

            img.onerror = function() {
                results[imageName] = 'error';
                updateResults();
                console.error(`❌ ${imageName} falhou ao carregar`);
            };

            img.src = `images/${imageName}`;
            imagesContainer.appendChild(img);
        }

        // Test all images
        ['f1.png', 'f2.png', 'f3.png', 'f4.png', 'f5.png'].forEach(testImage);

        // Additional network tests
        setTimeout(() => {
            console.log('--- Teste adicional com fetch ---');
            ['f1.png', 'f2.png', 'f3.png', 'f4.png', 'f5.png'].forEach(async (imageName) => {
                try {
                    const response = await fetch(`images/${imageName}`, { method: 'HEAD' });
                    console.log(`FETCH ${imageName}: Status ${response.status} - ${response.statusText}`);
                    console.log(`Content-Type: ${response.headers.get('content-type')}`);
                    console.log(`Content-Length: ${response.headers.get('content-length')}`);
                } catch (error) {
                    console.error(`FETCH ${imageName}: Erro -`, error);
                }
            });
        }, 2000);
    </script>
</body>
</html>
