<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Validation Test - Giuliano Cardoso Portfolio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
        }

        .test-overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 400px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            z-index: 10000;
            border-left: 2px solid #00ff00;
        }

        .test-header {
            color: #ffff00;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .test-controls {
            margin-bottom: 20px;
            text-align: center;
        }

        .test-btn {
            background: #333;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 8px 16px;
            margin: 5px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
        }

        .test-btn:hover {
            background: #00ff00;
            color: #000;
        }

        .main-content {
            margin-right: 400px;
            position: relative;
        }

        .test-status {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 3px;
        }

        .status-pending { border-color: #ffff00; }
        .status-running { border-color: #0099ff; }
        .status-passed { border-color: #00ff00; }
        .status-failed { border-color: #ff0000; }

        @media (max-width: 768px) {
            .test-overlay {
                width: 100%;
                height: 200px;
                top: auto;
                bottom: 0;
                right: 0;
                font-size: 10px;
                padding: 10px;
            }

            .main-content {
                margin-right: 0;
                margin-bottom: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="test-overlay">
        <div class="test-header">
            🧪 CAROUSEL VALIDATION
            <br>Task 5 - Final Testing
        </div>

        <div class="test-controls">
            <button class="test-btn" onclick="runAllTests()">🚀 Run All Tests</button>
            <button class="test-btn" onclick="runQuickTest()">⚡ Quick Test</button>
            <button class="test-btn" onclick="clearResults()">🧹 Clear</button>
        </div>

        <div id="testResults">
            <div class="test-status status-pending">
                Ready to test carousel implementation...
            </div>
        </div>
    </div>

    <div class="main-content">
        <iframe
            src="index.html"
            width="100%"
            height="100%"
            style="border: none; display: block; min-height: 100vh;"
            id="siteFrame">
        </iframe>
    </div>

    <script>
        let testRunner = null;

        function updateTestStatus(message, type = 'pending') {
            const results = document.getElementById('testResults');
            const status = document.createElement('div');
            status.className = `test-status status-${type}`;
            status.innerHTML = message;
            results.appendChild(status);
            results.scrollTop = results.scrollHeight;
        }

        function clearResults() {
            document.getElementById('testResults').innerHTML =
                '<div class="test-status status-pending">Ready to test carousel implementation...</div>';
        }

        async function runQuickTest() {
            updateTestStatus('🔄 Running quick validation...', 'running');

            const frame = document.getElementById('siteFrame');
            const frameDoc = frame.contentDocument || frame.contentWindow.document;

            // Basic checks
            const carousel = frameDoc.querySelector('.carousel-container');
            const images = frameDoc.querySelectorAll('.carousel-image');
            const dots = frameDoc.querySelectorAll('.dot');

            if (!carousel) {
                updateTestStatus('❌ Carousel container not found', 'failed');
                return;
            }

            updateTestStatus(`✅ Found carousel with ${images.length} images and ${dots.length} dots`, 'passed');

            // Check active states
            const activeImages = frameDoc.querySelectorAll('.carousel-image.active');
            const activeDots = frameDoc.querySelectorAll('.dot.active');

            if (activeImages.length === 1 && activeDots.length === 1) {
                updateTestStatus('✅ Proper active state management', 'passed');
            } else {
                updateTestStatus(`❌ Active state issue: ${activeImages.length} images, ${activeDots.length} dots`, 'failed');
            }

            updateTestStatus('📋 Quick test completed', 'passed');
        }

        async function runAllTests() {
            updateTestStatus('🚀 Starting comprehensive validation...', 'running');

            const frame = document.getElementById('siteFrame');

            // Wait for frame to load
            if (!frame.contentDocument) {
                updateTestStatus('⏳ Waiting for site to load...', 'running');
                await new Promise(resolve => {
                    frame.onload = resolve;
                });
            }

            const frameWindow = frame.contentWindow;
            const frameDoc = frame.contentDocument;

            // Inject test script into iframe
            const script = frameDoc.createElement('script');
            script.textContent = await fetch('carousel-validation-test.js').then(r => r.text());
            frameDoc.head.appendChild(script);

            // Override console.log in iframe to capture results
            const originalLog = frameWindow.console.log;
            frameWindow.console.log = (...args) => {
                const message = args.join(' ');

                if (message.includes('✅')) {
                    updateTestStatus(message, 'passed');
                } else if (message.includes('❌')) {
                    updateTestStatus(message, 'failed');
                } else if (message.includes('🚀') || message.includes('📋') || message.includes('⏱️') ||
                          message.includes('👆') || message.includes('🖱️') || message.includes('🎨') ||
                          message.includes('♿') || message.includes('📱') || message.includes('⚡')) {
                    updateTestStatus(message, 'running');
                } else {
                    updateTestStatus(message, 'pending');
                }

                originalLog.apply(frameWindow.console, args);
            };

            updateTestStatus('📊 Tests running in main site...', 'running');
        }

        // Auto-load when page loads
        window.addEventListener('load', () => {
            updateTestStatus('🌐 Site loaded successfully', 'passed');
            updateTestStatus('💡 Click "Run All Tests" to start validation', 'pending');
        });
    </script>
</body>
</html>
